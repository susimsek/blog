schema:
  - internal/graphql/schema.graphqls

exec:
  filename: internal/graphql/generated.go
  package: graphql

model:
  filename: internal/graphql/model/models_gen.go
  package: model

resolver:
  layout: follow-schema
  dir: internal/graphql
  package: graphql
  filename_template: '{name}.resolvers.go'
  preserve_resolver: true

skip_mod_tidy: true

models:
  Date:
    model:
      - suaybsimsek.com/blog-api/pkg/graphql/scalars.Date
  DateTime:
    model:
      - time.Time
  Email:
    model:
      - suaybsimsek.com/blog-api/pkg/graphql/scalars.Email
  Locale:
    model:
      - suaybsimsek.com/blog-api/pkg/graphql/scalars.Locale
  URL:
    model:
      - suaybsimsek.com/blog-api/pkg/graphql/scalars.URL
