version: 2.1

orbs:
  sonarcloud: sonarsource/sonarcloud@4.0.0
  snyk: snyk/snyk@2.3.0
  docker: circleci/docker@3.0.1

executors:
  node-executor:
    docker:
      - image: cimg/node:24.13.0

jobs:
  build-and-deploy:
    executor: node-executor
    environment:
      GO_VERSION: "1.24.0"
    steps:
      - checkout

      - restore_cache:
          keys:
            - v2-pnpm-store-{{ checksum "pnpm-lock.yaml" }}
            - v2-pnpm-store-

      - restore_cache:
          keys:
            - v1-go-cache-{{ checksum "go.sum" }}
            - v1-go-cache-

      - run:
          name: Enable Corepack (pnpm)
          command: corepack enable

      - run:
          name: Configure pnpm store dir
          command: pnpm config set store-dir ~/.pnpm-store

      - run:
          name: Install Dependencies (pnpm)
          command: pnpm install --frozen-lockfile

      - run:
          name: Install Go
          command: |
            curl -fsSL "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz" -o /tmp/go.tar.gz
            rm -rf "${HOME}/.go"
            tar -C "${HOME}" -xzf /tmp/go.tar.gz
            mv "${HOME}/go" "${HOME}/.go"
            {
              echo 'export GOROOT="${HOME}/.go"'
              echo 'export GOPATH="${HOME}/go-workspace"'
              echo 'export PATH="${GOROOT}/bin:${GOPATH}/bin:${PATH}"'
            } >> "${BASH_ENV}"
            . "${BASH_ENV}"
            mkdir -p "${GOPATH}" "${HOME}/.cache/go-build"
            go version

      - save_cache:
          key: v2-pnpm-store-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.pnpm-store

      - snyk/scan:
          fail-on-issues: false
          additional-arguments: "--all-projects --exclude=go.mod"

      - run:
          name: Run Frontend Tests
          command: pnpm test

      - run:
          name: Run Backend Tests
          command: |
            . "${BASH_ENV}"
            pnpm run backend:test

      - run:
          name: Build Go Coverage For Sonar
          command: |
            . "${BASH_ENV}"
            pnpm run backend:cover

      - save_cache:
          key: v1-go-cache-{{ checksum "go.sum" }}
          paths:
            - ~/go-workspace/pkg/mod
            - ~/.cache/go-build

      - sonarcloud/scan

      - run:
          name: Build
          command: pnpm run build

      - setup_remote_docker:
          docker_layer_caching: true

      - run:
          name: Docker Build & Push
          command: |
            if [ "${CIRCLE_BRANCH}" != "main" ]; then
              echo "Skipping docker publish on branch ${CIRCLE_BRANCH}";
              exit 0;
            fi
            if [ -n "${DOCKER_PASSWORD:-}" ]; then
              echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_LOGIN}" --password-stdin
            fi

            IMAGE_NAME="${DOCKER_LOGIN}/${CIRCLE_PROJECT_REPONAME}"
            docker build -t "${IMAGE_NAME}:${CIRCLE_BRANCH}" .
            docker push "${IMAGE_NAME}:${CIRCLE_BRANCH}"

      - run:
          name: Deploy to Vercel
          command: |
            if [ "${CIRCLE_BRANCH}" != "main" ]; then
              echo "Skipping Vercel deploy on branch ${CIRCLE_BRANCH}";
              exit 0;
            fi

            npm install --global vercel@latest
            vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"
            vercel deploy --prod --yes --archive=tgz --token="${VERCEL_TOKEN}"

workflows:
  version: 2
  deploy-workflow:
    jobs:
      - build-and-deploy:
          context: sonarcloud
