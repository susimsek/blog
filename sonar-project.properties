sonar.organization=susimsek
sonar.projectKey=blog
sonar.projectName=Blog Application

sonar.projectVersion=1.0
sonar.host.url=https://sonarcloud.io
sonar.login=${SONAR_TOKEN}
sonar.scm.disabled=true

# Source Files
sonar.sources=./src,./api,./internal,./pkg
sonar.inclusions=src/**,api/graphql/**,internal/**,pkg/apperrors/**,pkg/httpapi/**,pkg/graphql/**,pkg/newsletter/**
sonar.exclusions=**/node_modules/**,**/.next/**,*/.build/**,**/*.test.js,**/*.test.ts,**/*.test.jsx,**/*.test.tsx,**/*.spec.js,**/*.spec.ts,**/*.spec.jsx,**/*.spec.tsx,**/*_test.go,internal/graphql/generated.go,internal/graphql/model/**,src/graphql/generated/**
sonar.tests=./__tests__,./api,./internal,./pkg
sonar.test.inclusions=**/*.test.js,**/*.test.ts,**/*.test.jsx,**/*.test.tsx,**/*.spec.js,**/*.spec.ts,**/*.spec.jsx,**/*.spec.tsx,**/*_test.go

# Language Specific Settings
sonar.sourceEncoding=UTF-8

# Include Both JavaScript and TypeScript
sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx
sonar.typescript.tsconfigPath=tsconfig.json

# Tests and Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.go.coverage.reportPaths=coverage/go-cover.out
sonar.go.golangci-lint.reportPaths=golangci-lint-report.xml

# Additional Settings
sonar.testExecutionReportPaths=coverage/test-report.xml
