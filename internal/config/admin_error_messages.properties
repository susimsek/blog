# Admin GraphQL error message catalog
# Format: <locale>.<error_code>=<message>

en.INVALID_CREDENTIALS=Invalid email or password.
tr.INVALID_CREDENTIALS=E-posta veya parola hatalı.

en.ADMIN_SESSION_INVALID=Your session expired. Sign in again.
tr.ADMIN_SESSION_INVALID=Oturumunuz sona erdi. Yeniden giriş yapın.

en.ADMIN_AUTH_REQUIRED=Your session expired. Sign in again.
tr.ADMIN_AUTH_REQUIRED=Oturumunuz sona erdi. Yeniden giriş yapın.

en.INVALID_CSRF_TOKEN=Security verification failed. Refresh the page and try again.
tr.INVALID_CSRF_TOKEN=Güvenlik doğrulaması başarısız oldu. Sayfayı yenileyip tekrar deneyin.

en.SERVICE_UNAVAILABLE=Admin service is temporarily unavailable. Please try again.
tr.SERVICE_UNAVAILABLE=Yönetim servisi geçici olarak kullanılamıyor. Lütfen tekrar deneyin.

en.BAD_REQUEST=Request is invalid.
tr.BAD_REQUEST=İstek geçersiz.

en.UNAUTHORIZED=Authentication is required.
tr.UNAUTHORIZED=Kimlik doğrulaması gerekli.

en.ADMIN_CURRENT_PASSWORD_INCORRECT=Your current password is incorrect.
tr.ADMIN_CURRENT_PASSWORD_INCORRECT=Mevcut parola hatalı.

en.ADMIN_CURRENT_PASSWORD_REQUIRED=Enter your current password.
tr.ADMIN_CURRENT_PASSWORD_REQUIRED=Mevcut parolanı gir.

en.ADMIN_PASSWORD_TOO_SHORT=Use at least 8 characters.
tr.ADMIN_PASSWORD_TOO_SHORT=En az 8 karakter kullan.

en.ADMIN_PASSWORD_CONFIRM_MISMATCH=Password confirmation does not match.
tr.ADMIN_PASSWORD_CONFIRM_MISMATCH=Parola doğrulaması eşleşmiyor.

en.ADMIN_PASSWORD_SAME_AS_CURRENT=Choose a password different from the current one.
tr.ADMIN_PASSWORD_SAME_AS_CURRENT=Mevcut paroladan farklı bir parola seç.

en.ADMIN_EMAIL_INVALID=Enter a valid email address.
tr.ADMIN_EMAIL_INVALID=Geçerli bir e-posta adresi gir.

en.ADMIN_EMAIL_SAME=Choose an email different from the current one.
tr.ADMIN_EMAIL_SAME=Mevcut e-postadan farklı bir adres seç.

en.ADMIN_EMAIL_TAKEN=This email is already in use.
tr.ADMIN_EMAIL_TAKEN=Bu e-posta adresi zaten kullanımda.

en.ADMIN_GOOGLE_NOT_LINKED=No Google account is connected right now.
tr.ADMIN_GOOGLE_NOT_LINKED=Şu anda bağlı bir Google hesabı yok.

en.ADMIN_GITHUB_NOT_LINKED=No GitHub account is connected right now.
tr.ADMIN_GITHUB_NOT_LINKED=Şu anda bağlı bir GitHub hesabı yok.

en.ADMIN_USERNAME_TAKEN=This username is already in use.
tr.ADMIN_USERNAME_TAKEN=Bu kullanıcı adı zaten kullanımda.

en.ADMIN_USERNAME_SAME=Choose a username different from the current one.
tr.ADMIN_USERNAME_SAME=Mevcut kullanıcı adından farklı bir kullanıcı adı seç.

en.ADMIN_USERNAME_PATTERN_INVALID=Use letters, numbers, dot, underscore, or dash only.
tr.ADMIN_USERNAME_PATTERN_INVALID=Sadece harf, rakam, nokta, alt çizgi ve tire kullan.

en.ADMIN_USERNAME_LENGTH_INVALID=Username must be between 3 and 32 characters.
tr.ADMIN_USERNAME_LENGTH_INVALID=Kullanıcı adı 3 ile 32 karakter arasında olmalı.

en.ADMIN_NAME_LENGTH_INVALID=Name must be between 2 and 80 characters.
tr.ADMIN_NAME_LENGTH_INVALID=İsim 2 ile 80 karakter arasında olmalı.

en.ADMIN_AVATAR_FORMAT_INVALID=Use PNG, JPEG, or WebP image.
tr.ADMIN_AVATAR_FORMAT_INVALID=PNG, JPEG veya WebP görsel kullan.

en.ADMIN_AVATAR_TOO_LARGE=Use an image up to 2MB.
tr.ADMIN_AVATAR_TOO_LARGE=En fazla 2MB görsel kullan.

en.ADMIN_AVATAR_INVALID=Selected file is not a valid image.
tr.ADMIN_AVATAR_INVALID=Seçilen dosya geçerli bir görsel değil.
