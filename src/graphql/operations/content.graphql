query posts($locale: Locale!, $input: PostsQueryInput) {
  posts(locale: $locale, input: $input) {
    status
    locale
    total
    page
    size
    sort
    engagement {
      postId
      likes
      hits
    }
    nodes {
      id
      slug
      title
      category {
        id
        name
        color
        icon
      }
      publishedDate
      updatedDate
      summary
      searchText
      thumbnail
      readingTime
      source
      url
      topics {
        id
        name
        color
        link
      }
    }
  }
}

query post($locale: Locale!, $id: ID!) {
  post(locale: $locale, id: $id) {
    status
    locale
    node {
      id
      slug
      title
      category {
        id
        name
        color
        icon
      }
      publishedDate
      updatedDate
      summary
      searchText
      thumbnail
      readingTime
      source
      url
      topics {
        id
        name
        color
        link
      }
    }
    engagement {
      postId
      likes
      hits
    }
  }
}

query comments($postId: ID!) {
  comments(postId: $postId) {
    status
    postId
    total
    threads {
      root {
        id
        parentId
        authorName
        avatarUrl
        content
        createdAt
      }
      replies {
        id
        parentId
        authorName
        avatarUrl
        content
        createdAt
      }
    }
  }
}

query postRuntime($locale: Locale!, $id: ID!) {
  post(locale: $locale, id: $id) {
    status
    engagement {
      postId
      likes
      hits
    }
  }
  comments(postId: $id) {
    status
    postId
    total
    threads {
      root {
        id
        parentId
        authorName
        avatarUrl
        content
        createdAt
      }
      replies {
        id
        parentId
        authorName
        avatarUrl
        content
        createdAt
      }
    }
  }
}

mutation incrementPostLike($postId: ID!) {
  incrementPostLike(postId: $postId) {
    status
    postId
    likes
    hits
  }
}

mutation incrementPostHit($postId: ID!) {
  incrementPostHit(postId: $postId) {
    status
    postId
    likes
    hits
  }
}

mutation addComment($input: AddCommentInput!) {
  addComment(input: $input) {
    status
    postId
    moderationStatus
  }
}

mutation subscribeNewsletter($input: NewsletterSubscribeInput!) {
  subscribeNewsletter(input: $input) {
    status
    forwardTo
  }
}

mutation resendNewsletterConfirmation($input: NewsletterResendInput!) {
  resendNewsletterConfirmation(input: $input) {
    status
    forwardTo
  }
}

mutation confirmNewsletterSubscription($token: String!) {
  confirmNewsletterSubscription(token: $token) {
    status
    forwardTo
  }
}

mutation unsubscribeNewsletter($token: String!) {
  unsubscribeNewsletter(token: $token) {
    status
    forwardTo
  }
}
