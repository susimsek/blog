query PostsQuery($locale: Locale!, $input: PostsQueryInput) {
  posts(locale: $locale, input: $input) {
    status
    locale
    total
    page
    size
    sort
    engagement {
      postId
      likes
      hits
      comments
    }
    nodes {
      id
      slug
      title
      category {
        id
        name
        color
        icon
      }
      publishedDate
      updatedDate
      summary
      searchText
      thumbnail
      readingTime
      source
      url
      topics {
        id
        name
        color
        link
      }
    }
  }
}

query PostQuery($locale: Locale!, $id: ID!) {
  post(locale: $locale, id: $id) {
    status
    locale
    node {
      id
      slug
      title
      category {
        id
        name
        color
        icon
      }
      publishedDate
      updatedDate
      summary
      searchText
      thumbnail
      readingTime
      source
      url
      topics {
        id
        name
        color
        link
      }
    }
    engagement {
      postId
      likes
      hits
      comments
    }
  }
}

query CommentsQuery($postId: ID!) {
  comments(postId: $postId) {
    status
    postId
    total
    threads {
      root {
        id
        parentId
        authorName
        avatarUrl
        content
        createdAt
      }
      replies {
        id
        parentId
        authorName
        avatarUrl
        content
        createdAt
      }
    }
  }
}

query PostRuntimeQuery($locale: Locale!, $id: ID!) {
  post(locale: $locale, id: $id) {
    status
    engagement {
      postId
      likes
      hits
      comments
    }
  }
  comments(postId: $id) {
    status
    postId
    total
    threads {
      root {
        id
        parentId
        authorName
        avatarUrl
        content
        createdAt
      }
      replies {
        id
        parentId
        authorName
        avatarUrl
        content
        createdAt
      }
    }
  }
}

mutation IncrementPostLikeMutation($postId: ID!) {
  incrementPostLike(postId: $postId) {
    status
    postId
    likes
    hits
  }
}

mutation IncrementPostHitMutation($postId: ID!) {
  incrementPostHit(postId: $postId) {
    status
    postId
    likes
    hits
  }
}

mutation AddCommentMutation($input: AddCommentInput!) {
  addComment(input: $input) {
    status
    postId
    moderationStatus
  }
}

mutation SubscribeNewsletterMutation($input: NewsletterSubscribeInput!) {
  subscribeNewsletter(input: $input) {
    status
    forwardTo
  }
}

mutation ResendNewsletterConfirmationMutation($input: NewsletterResendInput!) {
  resendNewsletterConfirmation(input: $input) {
    status
    forwardTo
  }
}

mutation ConfirmNewsletterSubscriptionMutation($token: String!) {
  confirmNewsletterSubscription(token: $token) {
    status
    forwardTo
  }
}

mutation UnsubscribeNewsletterMutation($token: String!) {
  unsubscribeNewsletter(token: $token) {
    status
    forwardTo
  }
}
